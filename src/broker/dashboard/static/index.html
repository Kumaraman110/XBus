<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XBus control plane</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>XBus <span class="tag">control plane</span></h1>
    <p id="status" class="status">Connecting…</p>
  </header>

  <section id="banner" class="banner" hidden></section>
  <section id="audit" class="audit"></section>

  <main>
    <h2>Sessions</h2>
    <table id="sessions">
      <thead>
        <tr><th>Session</th><th>State</th><th>Conn/Ready</th><th>Last sent</th><th>Last received</th><th>Delivery (q/d/ack/reply/fail)</th><th>Project</th></tr>
      </thead>
      <tbody id="sessions-body"><tr><td colspan="7">Loading…</td></tr></tbody>
    </table>

    <h2>Audit ledger <span class="muted">(append-only, hash-chained)</span></h2>
    <table id="ledger">
      <thead><tr><th>#</th><th>Event</th><th>Actor</th><th>Subject</th><th>When</th></tr></thead>
      <tbody id="ledger-body"><tr><td colspan="5">Loading…</td></tr></tbody>
    </table>
  </main>

  <script src="/app.js"></script>
</body>
</html>
